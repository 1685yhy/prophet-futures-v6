<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh;min-width:1200px}
#app{display:flex;height:100vh}
#left{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid #21262d}
#kline{flex:2.5;position:relative}
#vol{flex:0.8;position:relative}
#equity{flex:0.9;position:relative}
#right{width:420px;display:flex;flex-direction:column;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#161b22;border-bottom:1px solid #21262d;flex-shrink:0}
#toolbar .btn{padding:5px 12px;border-radius:4px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:12px;white-space:nowrap}
#toolbar .btn:hover{background:#30363d}
#toolbar .btn.active{background:#1f6feb;border-color:#1f6feb}
#toolbar input{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-size:12px;width:100px}
#toolbar .sep{color:#30363d}
#listCont{flex:1;overflow-y:auto;padding:4px 0}
.day{cursor:pointer;padding:6px 12px;font-size:12px;line-height:1.5;border-left:3px solid transparent;transition:all .12s;display:flex;align-items:flex-start;gap:8px}
.day:hover{background:#161b22}
.day.sel{background:#1a2540;border-left-color:#58a6ff}
.day .col1{flex-shrink:0;width:82px}
.day .col2{flex:1;min-width:0}
.day .dt{font-weight:600;color:#58a6ff}
.day .ch{font-size:11px}
.day .ops{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.day .ops .tag{padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;color:#fff}
.day .pnl{font-size:11px;color:#8b949e;margin-top:1px}
#detail{padding:12px;background:#161b22;border-top:1px solid #21262d;flex-shrink:0;font-size:12px;max-height:300px;overflow-y:auto}
#detail table{width:100%;border-collapse:collapse}
#detail td{padding:2px 4px}
#detail .k{color:#8b949e;width:70px}
#detail .v{font-weight:500}
#legend{display:flex;gap:16px;padding:4px 12px;background:#161b22;border-bottom:1px solid #21262d;font-size:11px;flex-shrink:0;flex-wrap:wrap}
#legend span{display:flex;align-items:center;gap:3px}
#legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>

// === Charts ===
const klineChart = LightweightCharts.createChart(document.getElementById('kline'), {
  layout: { background: '#0d1117', textColor: '#8b949e' },
  grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
  crosshair: { mode: 1 },
  rightPriceScale: { borderColor: '#21262d', scaleMargins: { top: 0.03, bottom: 0.05 } },
  timeScale: { borderColor: '#21262d', fixLeftEdge: true, barSpacing: 8 },
});

const volChart = LightweightCharts.createChart(document.getElementById('vol'), {
  layout: { background: '#0d1117', textColor: '#8b949e' },
  grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
  rightPriceScale: { borderColor: '#21262d' },
  timeScale: { visible: false, fixLeftEdge: true },
});

const eqChart = LightweightCharts.createChart(document.getElementById('equity'), {
  layout: { background: '#0d1117', textColor: '#8b949e' },
  grid: { vertLines: { color: '#161b22' }, horzLines: { color: '#161b22' } },
  rightPriceScale: { borderColor: '#21262d' },
  timeScale: { borderColor: '#21262d', fixLeftEdge: true },
});

// K-line
const ohlc = DATA.filter(d=>d.open>0).map(d=>({time:d.date,open:d.open,high:d.high,low:d.low,close:d.close}));
const candleSeries = klineChart.addCandlestickSeries({
  upColor: '#ff4757', downColor: '#2ed573', borderUpColor: '#ff4757', borderDownColor: '#2ed573',
  wickUpColor: '#ff4757', wickDownColor: '#2ed573',
});
candleSeries.setData(ohlc);

// MA lines
[{key:'ma5',color:'#f0b90b',w:1},{key:'ma10',color:'#00b4d8',w:1},{key:'ma20',color:'#e040fb',w:1.5},{key:'ma60',color:'#ff6d00',w:1}].forEach(cfg=>{
  const s = klineChart.addLineSeries({color:cfg.color,lineWidth:cfg.w,priceLineVisible:false,lastValueVisible:false});
  s.setData(DATA.filter(d=>d[cfg.key]).map(d=>({time:d.date,value:d[cfg.key]})));
});

// Markers
const markers = [];
DATA.forEach(d => {
  d.ops.forEach(op => {
    let pos='belowBar', shape='arrowUp', color='#ff4757', text='';
    if (op.type.includes('SELL')||op.type.includes('SHORT')) { pos='aboveBar'; shape='arrowDown'; color='#2ed573'; }
    if (op.type==='BUY') text='多';
    else if (op.type==='SELL') text='空';
    else if (op.type.includes('ADD')) text='+';
    else if (op.type.includes('STOP')) { text='止'; color='#ffa502'; pos=op.type.includes('LONG')?'aboveBar':'belowBar'; shape=op.type.includes('LONG')?'arrowDown':'arrowUp'; }
    else if (op.type.includes('REV')) { text='反'; color='#a55eea'; }
    else if (op.type.includes('REDUCE')) { text='减'; color='#eccc68'; }
    markers.push({time:d.date, position:pos, color:color, shape:shape, text:text, size:2});
  });
});
candleSeries.setMarkers(markers);

// Volume
volChart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:''}).setData(
  DATA.filter(d=>d.volume>0).map(d=>({time:d.date,value:d.volume,color:d.close>=d.open?'#ff475744':'#2ed57344'}))
);

// Equity
eqChart.addAreaSeries({lineColor:'#58a6ff',topColor:'#58a6ff22',bottomColor:'#58a6ff05',lineWidth:2}).setData(
  DATA.map(d=>({time:d.date,value:d.equity}))
);
eqChart.addLineSeries({color:'#30363d',lineWidth:1,lineStyle:2}).setData(
  DATA.map(d=>({time:d.date,value:300000}))
);

// Sync scroll
function syncRange(src) {
  const r = src.timeScale().getVisibleRange();
  if (!r) return;
  [klineChart,volChart,eqChart].forEach(c=>{if(c!==src) c.timeScale().setVisibleRange(r);});
}
klineChart.timeScale().subscribeVisibleTimeRangeChange(()=>syncRange(klineChart));
volChart.timeScale().subscribeVisibleTimeRangeChange(()=>syncRange(volChart));
eqChart.timeScale().subscribeVisibleTimeRangeChange(()=>syncRange(eqChart));

// === List ===
let showAll = true;
function opTag(op) {
  const t = op.type;
  let bg = '#ff475722', c = '#ff4757', label = t;
  if (t.includes('SHORT')||t==='SELL') { bg='#2ed57322'; c='#2ed573'; }
  else if (t.includes('STOP')) { bg='#ffa50222'; c='#ffa502'; label='止损'; }
  else if (t.includes('REV')) { bg='#a55eea22'; c='#a55eea'; label='反手'; }
  else if (t.includes('REDUCE')) { bg='#eccc6822'; c='#eccc68'; label='减仓'; }
  else if (t.includes('ADD')) { bg='#ff6b8122'; c='#ff6b81'; label='加仓'; }
  else if (t==='BUY') label='做多';
  else if (t==='SELL') label='做空';
  return `<span class="tag" style="background:${bg};color:${c}">${label}</span>`;
}

function render() {
  const list = document.getElementById('dayList');
  list.innerHTML = '';
  let items = showAll ? DATA : DATA.filter(d=>d.ops.length>0);
  items.forEach((d,i) => {
    const div = document.createElement('div');
    div.className = 'day';
    div.onclick = () => {
      document.querySelectorAll('.day').forEach(e=>e.classList.remove('sel'));
      div.classList.add('sel');
      showDetail(d);
      klineChart.timeScale().scrollToPosition(Date.parse(d.date)/1000 - klineChart.timeScale().getVisibleRange().from, false);
    };
    const posC = d.pos.includes('多')?'#ff4757':d.pos.includes('空')?'#2ed573':'#8b949e';
    const chC = d.change>=0?'#ff4757':'#2ed573';
    const retC = d.ret>=0?'#ff4757':'#2ed573';
    div.innerHTML = `<div class="col1">
      <div class="dt">${d.date.slice(5)}</div>
      <div class="ch" style="color:${chC}">${d.change>=0?'+':''}${d.change.toFixed(2)}%</div>
    </div>
    <div class="col2">
      <span style="color:${posC};font-weight:600">${d.pos}</span>
      <span style="color:#8b949e;margin-left:4px">收${d.close.toFixed(0)}</span>
      <span style="color:${retC};margin-left:6px">${d.ret>=0?'+':''}${d.ret.toFixed(1)}%</span>
      ${d.ops.length?`<div class="ops">${d.ops.map(opTag).join('')}</div>`:''}
    </div>`;
    list.appendChild(div);
  });
}

function showDetail(d) {
  const posC = d.pos.includes('多')?'#ff4757':d.pos.includes('空')?'#2ed573':'#8b949e';
  const chC = d.change>=0?'#ff4757':'#2ed573';
  const retC = d.ret>=0?'#ff4757':'#2ed573';
  const fpC = d.float_pnl>=0?'#ff4757':'#2ed573';
  const e = document.getElementById('detail');
  e.style.display = 'block';
  e.innerHTML = `<h3 style="color:#58a6ff;margin-bottom:6px">${d.date} <span style="color:${posC}">${d.pos}</span></h3>
  <table>
    <tr><td class="k">开盘</td><td class="v">${d.open.toFixed(0)}</td><td class="k">最高</td><td class="v">${d.high.toFixed(0)}</td></tr>
    <tr><td class="k">最低</td><td class="v">${d.low.toFixed(0)}</td><td class="k">收盘</td><td class="v">${d.close.toFixed(0)}</td></tr>
    <tr><td class="k">涨跌幅</td><td class="v" style="color:${chC}">${d.change>=0?'+':''}${d.change.toFixed(2)}%</td><td class="k">持仓均价</td><td class="v">${d.entry>0?d.entry.toFixed(0):'—'}</td></tr>
    <tr><td class="k">浮盈</td><td class="v" style="color:${fpC}">¥${d.float_pnl.toLocaleString('zh-CN',{maximumFractionDigits:0})}</td><td class="k">净资产</td><td class="v">¥${d.equity.toLocaleString('zh-CN',{maximumFractionDigits:0})}</td></tr>
    <tr><td class="k">收益率</td><td class="v" style="color:${retC};font-weight:bold" colspan="3">${d.ret>=0?'+':''}${d.ret.toFixed(1)}%</td></tr>
  </table>
  ${d.ops.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #21262d"><div style="color:#8b949e;font-weight:600;margin-bottom:4px">操作记录</div>${d.ops.map(o=>`<div style="margin:2px 0;font-size:11px">${opTag(o)} ${o.desc}</div>`).join('')}</div>`:''}`;
}

function toggleFilter() {
  showAll = !showAll;
  document.getElementById('filterOps').classList.toggle('active', !showAll);
  render();
}

function searchDate() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const found = DATA.find(d => d.date.includes(q));
  if (!found) return alert('未找到 ' + q);
  const ts = new Date(found.date).getTime() / 1000;
  klineChart.timeScale().scrollToPosition(ts, false);
  // highlight in list
  const days = document.querySelectorAll('.day');
  days.forEach(e => e.classList.remove('sel'));
  const idx = DATA.indexOf(found);
  if (idx >= 0 && days[idx]) days[idx].classList.add('sel');
  showDetail(found);
}

function scrollToDate(which) {
  const d = which === 'first' ? DATA[0] : DATA[DATA.length-1];
  klineChart.timeScale().scrollToPosition(new Date(d.date).getTime()/1000, false);
}

render();
</script>
